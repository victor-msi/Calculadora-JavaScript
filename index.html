<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
</head>
<body>
  <div class="main-container">
    <button class="switch"></button>
    <div class="panel"></div>
    <div class="grid-container">
      <div class="grid-container__buttom" id="C">
        <button>C</button>
      </div>
      <div class="grid-container__buttom" id="/">
        <button>/</button>
      </div>
      <div class="grid-container__buttom" id="x">
        <button>x</button>
      </div>
      <div class="grid-container__buttom" id="<">
        <button><</button>
      </div>
      <div class="grid-container__buttom" id="7">
        <button>7</button>
      </div>
      <div class="grid-container__buttom" id="8">
        <button>8</button>
      </div>
      <div class="grid-container__buttom" id="9">
        <button>9</button>
      </div>
      <div class="grid-container__buttom" id="-">
        <button>-</button>
      </div>
      <div class="grid-container__buttom" id="4">
        <button>4</button>
      </div>
      <div class="grid-container__buttom" id="5">
        <button>5</button>
      </div>
      <div class="grid-container__buttom" id="6">
        <button>6</button>
      </div>
      <div class="grid-container__buttom" id="+">
        <button>+</button>
      </div>
      <div class="grid-container__buttom" id="1">
        <button>1</button>
      </div>
      <div class="grid-container__buttom" id="2">
        <button>2</button>
      </div>
      <div class="grid-container__buttom" id="3">
        <button>3</button>
      </div>
      <div class="grid-container__buttom" id="=">
        <button>=</button>
      </div>
      <div class="grid-container__buttom" id=".">
        <button>.</button>
      </div>
      <div class="grid-container__buttom" id="0">
        <button>0</button>
      </div>
      <div class="grid-container__buttom" id="00">
        <button>00</button>
      </div>
    </div>
  </div>
</body>
</html>
